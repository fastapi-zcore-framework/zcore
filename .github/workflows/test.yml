name: Test Suite (CI)

on:
  pull_request:
    branches:
      - master
      - develop
  push:
    branches:
      - master
      - develop

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Hatch and Ruff
        run: pip install hatch ruff

      - name: Run Ruff Lint Check
        run: ruff check src/zcore

      - name: Run Hatch Tests
        run: hatch test