site_name: ZCore
site_description: Minimalist, architectural framework built on top of FastAPI.
site_author: Ali Alf Ostovar
site_url: https://fastapi-zcore-framework.github.io/zcore

repo_name: fastapi-zcore-framework/zcore
repo_url: https://github.com/fastapi-zcore-framework/zcore

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favico.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.select

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  
  - Learn (Tutorial):
      - Overview: learn/overview.md
      - Installation & Scaffolding: learn/installation.md
      - "Step 1: Database Models": learn/1-db.md
      - "Step 2: Data Schemas": learn/2-schemas.md
      - "Step 3: Repository Layer": learn/3-repository.md
      - "Step 4: Business Logic": learn/4-service.md
      - "Step 5: Automated Routing": learn/5-router.md
      - "Step 6: Domain Packaging": learn/6-plugin.md
      - "Step 7: Framework Orchestration": learn/7-kernel.md
      - "Step 8: Application Bootstrapping": learn/8-main.md
      
  - How-To Guides:
      - JWT Authentication & Scopes: how-to/auth-setup.md
      - Multi-Repository Transactions: how-to/multi-repo-transactions.md
      - Project-Wide Base Router & Dependencies: how-to/base-router-extensibility.md
      - Dynamic Role-Based Field Masking: how-to/field-masking.md
      - Custom S3 Cloud Storage: how-to/custom-storage-provider.md
      - WebSockets & Redis PubSub: how-to/websocket-pubsub.md
      
  - Architecture & Reference:
      - Core & Infrastructure:
          - Dependency Injection: features/infrastructure/di.md
          - Framework Engine: features/infrastructure/kernel.md
          - Kernel Events: features/infrastructure/events.md
          - ASGI Middlewares: features/infrastructure/middleware.md
          - Application Entry: features/infrastructure/main.md
          - Configuration Settings: features/infrastructure/config.md
          - CLI Scaffolding Tool: features/infrastructure/cli.md
          - System Utilities: features/infrastructure/utils.md
      - Data & Transactions:
          - Database Manager: features/database/db.md
          - Repository Pattern: features/database/repository.md
          - Business Services: features/database/service.md
          - Unit of Work: features/database/uow.md
          - Database Events: features/database/db-events.md
          - Pagination Engine: features/database/pagination.md
          - Dynamic Search Engine: features/database/search.md
      - Security & Shielding:
          - Thread-Safe Context: features/security/context.md
          - Cryptographic Protocols: features/security/security.md
          - API Routing Mechanics: features/security/api-router.md
          - Zchema Security & Schema Pruning: features/security/zchema.md
          - Centralized Exception Handler: features/security/exceptions.md
      - Advanced Ecosystem:
          - Distributed Caching: features/ecosystem/cache.md
          - File Storage & Security: features/ecosystem/storage.md
          - WebSocket Streaming: features/ecosystem/stream.md
          
  - Pocket Reference & Cheat Sheet: cheatsheet.md
