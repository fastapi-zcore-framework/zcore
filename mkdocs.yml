site_name: ZCore
site_description: Minimalist, architectural framework built on top of FastAPI.
site_author: Ali Alf Ostovar
site_url: https://fastapi-zcore-framework.github.io/zcore

repo_name: fastapi-zcore-framework/zcore
repo_url: https://github.com/fastapi-zcore-framework/zcore

theme:
  name: shadcn
  logo: assets/logo.png
  favicon: assets/favico.png
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.select

plugins:
  - search

markdown_extensions:
  - codehilite
  - pymdownx.tabbed
  - admonition

extra_css:
  - overrides.css

nav:
  - Home: index.md
  
  - Learn:
      - "10-Minute Quickstart": learn/quickstart.md
      - Tutorial:
          - Overview: learn/overview.md
          - Installation & Scaffolding: learn/installation.md
          - "Step 1: Database Models": learn/1-db.md
          - "Step 2: Data Schemas": learn/2-schemas.md
          - "Step 3: Repository Layer": learn/3-repository.md
          - "Step 4: Business Logic": learn/4-service.md
          - "Step 5: Automated Routing": learn/5-router.md
          - "Step 6: Domain Packaging": learn/6-plugin.md
          - "Step 7: Framework Orchestration": learn/7-kernel.md
          - "Step 8: Application Bootstrapping": learn/8-main.md
      
  - How-To Guides:
      - JWT Authentication & Scopes: how-to/auth-setup.md
      - Multi-Repository Transactions: how-to/multi-repo-transactions.md
      - Project-Wide Base Router & Dependencies: how-to/base-router-extensibility.md
      - Dynamic Role-Based Field Masking: how-to/field-masking.md
      - Custom S3 Cloud Storage: how-to/custom-storage-provider.md
      - WebSockets & Redis PubSub: how-to/websocket-pubsub.md
      
  - Architecture & Reference:
      - Core & Infrastructure:
          - Dependency Injection: features/infrastructure/di.md # Covers: IoCContainer, Scoped DI context, reflection cache, nested dependencies, Annotated, get_db
          - Framework Engine: features/infrastructure/kernel.md # Covers: Plugin protocol, Central lifespan, dependency sort, missing dependency check
          - Kernel Events: features/infrastructure/events.md # Covers: EventDispatcher, concurrent execution, try/except isolation
          - ASGI Middlewares: features/infrastructure/middleware.md # Covers: RequestLogMiddleware, ScopedDependencyMiddleware, request correlation id
          - Application Entry: features/infrastructure/main.md # Covers: main.py template, setup bootstrap
          - Configuration Settings: features/infrastructure/config.md # Covers: Pydantic Settings, SettingsProxy, Lazy imports
          - CLI Scaffolding Tool: features/infrastructure/cli.md # Covers: zc run, gensecret, startapp templating, path evaluation
          - System Utilities: features/infrastructure/utils.md # Covers: slugify, json encoding fallback, validate_json_schema
      - Data & Transactions:
          - Database Manager: features/database/db.md # Covers: DatabaseManager, AsyncEngine, Connection pools, SQLite fallback
          - Repository Pattern: features/database/repository.md # Covers: BaseRepository, Read/Write/Search Mixins, exist optimization, get_by_ids fast path
          - Business Services: features/database/service.md # Covers: BaseService, safe commit context checks, post-read/write lifecycle hooks
          - Unit of Work: features/database/uow.md # Covers: UnitOfWork transaction isolation, post-commit event queues
          - Database Events: features/database/db-events.md # Covers: dispatch_db_event, error-isolated event propagation
          - Pagination Engine: features/database/pagination.md # Covers: Cursor/Offset pagination, Cursor Keyset sorting, Base64 encoding, order_by(None) count
          - Dynamic Search Engine: features/database/search.md # Covers: SearchEngine, JSON query builder, depth and max filters security, custom handlers, escaping wildcards
      - Security & Shielding:
          - Thread-Safe Context: features/security/context.md # Covers: contextvars, user and restricted fields, token reset/restoration safety
          - Cryptographic Protocols: features/security/security.md # Covers: Argon2 parameters, symmetric/asymmetric JWT signing, token expiry
          - API Routing Mechanics: features/security/api-router.md # Covers: ZCoreAPIRoute, response class preservation, vary header append logic, schema extraction
          - Zchema Security & Schema Pruning: features/security/zchema.md # Covers: Zchema model_validator/serializer, Context-aware data masking, Schema pruning
          - Centralized Exception Handler: features/security/exceptions.md # Covers: AppException hierarchy, app_exception_handler, standard API error envelope
      - Advanced Ecosystem:
          - Distributed Caching: features/ecosystem/cache.md # Covers: BaseCache/TTLLRUCache fallback, Pydantic type validation on cache hits, eviction loop safety, weakref
          - File Storage & Security: features/ecosystem/storage.md # Covers: LocalStorageProvider, MaxFileSize/SafeMimeType validators, Magic bytes validation, UUID truncation
          - WebSocket Streaming: features/ecosystem/stream.md # Covers: StreamManager, Redis PubSub fallback, queue overflow protection, subscription context manager

  - Quick Views:          
    - Pocket Reference & Cheat Sheet: cheatsheet.md